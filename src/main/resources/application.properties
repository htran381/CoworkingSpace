spring.application.name=roombooking

spring.datasource.url=jdbc:postgresql://localhost:5432/CoWorkingSpace
spring.datasource.username=postgres
spring.datasource.password=admin

server.port=8081

# ── Logging ───────────────────────────────────────────────────────────────────
# Print logs to console (default) AND write to file
logging.file.name=logs/roombooking.log

# Root level — only warnings and above from Spring internals
logging.level.root=WARN

# Our app — full INFO logging
logging.level.com.coworking=INFO

# Log format: timestamp | level | class | message
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} %-5level [%logger{36}] - %msg%n
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss} %-5level [%logger{36}] - %msg%n