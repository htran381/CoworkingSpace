<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin Login</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'DM Sans', sans-serif;
      background: #f0f2f5;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 24px;
    }
    .card {
      background: #fff;
      border-radius: 20px;
      padding: 40px 36px;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
      animation: fadeUp 0.5s ease both;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .icon {
      width: 56px; height: 56px;
      background: #1a1f2e;
      border-radius: 14px;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.4rem;
      margin-bottom: 20px;
    }
    h1 { font-size: 1.8rem; font-weight: 700; color: #1a1f2e; margin-bottom: 6px; }
    .subtitle { color: #8a8f9e; font-size: 0.9rem; margin-bottom: 28px; }
    .alert-error {
      background: #fee2e2; border: 1px solid #fca5a5;
      color: #dc2626; padding: 12px 16px; border-radius: 10px;
      margin-bottom: 20px; font-size: 0.9rem;
    }
    .field-group { margin-bottom: 18px; }
    .field-group label {
      display: block; font-size: 0.875rem; font-weight: 500;
      color: #374151; margin-bottom: 6px;
    }
    .field-group input {
      width: 100%; padding: 12px 16px;
      border: 1.5px solid #e5e7eb; border-radius: 10px;
      font-size: 1rem; font-family: 'DM Sans', sans-serif;
      color: #1a1f2e; outline: none;
      transition: border-color 0.2s;
    }
    .field-group input:focus { border-color: #1a1f2e; }
    .btn {
      width: 100%; padding: 14px;
      background: #1a1f2e; color: white; border: none;
      border-radius: 50px; font-size: 1rem; font-weight: 600;
      font-family: 'DM Sans', sans-serif; cursor: pointer;
      transition: all 0.2s;
    }
    .btn:hover { background: #2d3548; transform: translateY(-2px); }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">🔐</div>
    <h1>Admin Login</h1>
    <p class="subtitle">CoWork Space Booking System</p>

    <div class="alert-error" th:if="${error}" th:text="${error}"></div>

    <form method="post" action="/admin/login">
      <div class="field-group">
        <label>Username</label>
        <input type="text" name="username" placeholder="admin" required/>
      </div>
      <div class="field-group">
        <label>Password</label>
        <input type="password" name="password" placeholder="••••••" required/>
      </div>
      <button type="submit" class="btn">Sign In</button>
    </form>
  </div>
</body>
</html>
