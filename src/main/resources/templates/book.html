<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Book a Room</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&display=swap"
    rel="stylesheet" />
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: #f0f2f5;
      min-height: 100vh;
      padding: 40px 24px;
    }

    .page {
      max-width: 600px;
      margin: 0 auto;
      animation: fadeUp 0.5s ease both;
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(20px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      color: #6b7280;
      text-decoration: none;
      font-size: 0.9rem;
      margin-bottom: 24px;
      transition: color 0.2s;
    }

    .back-link:hover {
      color: #1a1f2e;
    }

    h1 {
      font-size: 2.4rem;
      font-weight: 700;
      color: #1a1f2e;
      letter-spacing: -0.03em;
      margin-bottom: 28px;
    }

    .form-card {
      background: #ffffff;
      border-radius: 20px;
      padding: 32px;
      box-shadow: 0 1px 4px rgba(0, 0, 0, 0.06);
    }

    .field-group {
      margin-bottom: 20px;
    }

    .field-group label {
      display: block;
      font-size: 0.9rem;
      font-weight: 500;
      color: #374151;
      margin-bottom: 8px;
    }

    .field-group input {
      width: 100%;
      padding: 14px 16px;
      border: 1.5px solid #e5e7eb;
      border-radius: 12px;
      font-size: 1rem;
      font-family: 'DM Sans', sans-serif;
      color: #1a1f2e;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
      background: #ffffff;
    }

    .field-group input:focus {
      border-color: #1a1f2e;
      box-shadow: 0 0 0 3px rgba(26, 31, 46, 0.08);
    }

    .time-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }

    .btn-confirm {
      width: 100%;
      padding: 16px;
      background: #1a1f2e;
      color: white;
      border: none;
      border-radius: 50px;
      font-size: 1rem;
      font-weight: 600;
      font-family: 'DM Sans', sans-serif;
      cursor: pointer;
      margin-top: 8px;
      transition: all 0.2s;
    }

    .btn-confirm:hover {
      background: #2d3548;
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(26, 31, 46, 0.2);
    }
  </style>
</head>

<body>
  <div class="page">
    <a href="/rooms" class="back-link">← Back to Rooms</a>

    <h1>Book a Room</h1>
    <!-- Error Alert -->
    <div th:if="${error}" style="
    background: #fee2e2;
    border: 1px solid #fca5a5;
    color: #dc2626;
    padding: 14px 20px;
    border-radius: 12px;
    margin-bottom: 20px;
    font-size: 0.95rem;
    font-weight: 500;">
      ⚠️ <span th:text="${error}"></span>
    </div>

    <div class="form-card">
      <form method="post" action="/book">
        <input type="hidden" name="roomId" th:value="${roomId}" />

        <div class="field-group">
          <label>Name</label>
          <input type="text" name="name" placeholder="Your full name" required />
        </div>

        <div class="field-group">
          <label>Email</label>
          <input type="email" name="email" placeholder="your@email.com" required />
        </div>

        <div class="field-group">
          <label>Date</label>
          <input type="date" name="date" th:value="${date}" required />
        </div>

        <div class="time-row">
          <div class="field-group">
            <label>Start Time</label>
            <input type="time" name="startTime" th:value="${startTime}" required / step="1800">
          </div>
          <div class="field-group">
            <label>End Time</label>
            <input type="time" name="endTime" th:value="${endTime}" required / step="1800">
          </div>
        </div>

        <button type="submit" class="btn-confirm">Confirm Booking</button>
      </form>
    </div>
  </div>
</body>

</html>
