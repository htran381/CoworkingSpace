<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>CoWork Space Booking</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: #ffffff;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
    }

    .container {
      max-width: 700px;
      width: 100%;
      text-align: center;
      animation: fadeUp 0.6s ease both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .hero-image {
      width: 100%;
      height: 300px;
      object-fit: cover;
      border-radius: 20px;
      margin-bottom: 36px;
      background: linear-gradient(135deg, #e8e0d8 0%, #c9bfb0 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .hero-image img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      border-radius: 20px;
    }

    /* Fallback gradient if image doesn't load */
    .hero-placeholder {
      width: 100%;
      height: 300px;
      border-radius: 20px;
      background: linear-gradient(135deg, #f0ebe3 0%, #ddd4c6 50%, #c9bfb0 100%);
      margin-bottom: 36px;
      position: relative;
      overflow: hidden;
    }

    .hero-placeholder::after {
      content: '';
      position: absolute;
      inset: 0;
      background: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23b0a090' fill-opacity='0.15'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
    }

    h1 {
      font-size: 3rem;
      font-weight: 700;
      color: #1a1f2e;
      letter-spacing: -0.03em;
      margin-bottom: 12px;
      line-height: 1.1;
    }

    .subtitle {
      font-size: 1.1rem;
      color: #8a8f9e;
      font-weight: 400;
      margin-bottom: 40px;
      letter-spacing: 0.01em;
    }

    .buttons {
      display: flex;
      gap: 16px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .btn-primary {
      background: #1a1f2e;
      color: #ffffff;
      padding: 16px 40px;
      border-radius: 50px;
      text-decoration: none;
      font-size: 1rem;
      font-weight: 600;
      font-family: 'DM Sans', sans-serif;
      transition: all 0.2s ease;
      letter-spacing: 0.01em;
    }

    .btn-primary:hover {
      background: #2d3548;
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(26,31,46,0.2);
    }

    .btn-secondary {
      background: #f0f0f0;
      color: #1a1f2e;
      padding: 16px 40px;
      border-radius: 50px;
      text-decoration: none;
      font-size: 1rem;
      font-weight: 600;
      font-family: 'DM Sans', sans-serif;
      transition: all 0.2s ease;
      letter-spacing: 0.01em;
    }

    .btn-secondary:hover {
      background: #e0e0e0;
      transform: translateY(-2px);
    }
  </style>
</head>
<body>
  <div class="container">
    <img src="/images/homepageImg.jpg"
         alt="Coworking Space"
         style="width:100%; height:300px; object-fit:cover; border-radius:20px; margin-bottom:36px;"/>

    <h1>CoWork Space Booking</h1>
    <p class="subtitle">Your workspace, your schedule.</p>

    <div class="buttons">
      <a href="/rooms" class="btn-primary">Browse Rooms</a>
      <a href="/reservations" class="btn-secondary">View Reservations</a>
      <a href="/notifications" class="btn-secondary">Notifications</a>
      <a href="/admin" class="btn-secondary">Admin</a>
    </div>
  </div>
</body>
</html>
