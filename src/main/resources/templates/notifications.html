<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Notifications</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: #f0f2f5;
      min-height: 100vh;
      padding: 40px 24px;
    }

    .page { max-width: 900px; margin: 0 auto; animation: fadeUp 0.5s ease both; }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      color: #6b7280;
      text-decoration: none;
      font-size: 0.9rem;
      margin-bottom: 24px;
      transition: color 0.2s;
    }
    .back-link:hover { color: #1a1f2e; }

    h1 {
      font-size: 2.4rem;
      font-weight: 700;
      color: #1a1f2e;
      letter-spacing: -0.03em;
      margin-bottom: 6px;
    }

    .page-subtitle {
      color: #8a8f9e;
      font-size: 0.95rem;
      margin-bottom: 28px;
    }

    .table-card {
      background: #ffffff;
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 1px 4px rgba(0,0,0,0.06);
    }

    table { width: 100%; border-collapse: collapse; }

    thead tr { border-bottom: 1.5px solid #f3f4f6; }

    th {
      text-align: left;
      padding: 14px 20px;
      font-size: 0.85rem;
      font-weight: 600;
      color: #6b7280;
      letter-spacing: 0.02em;
    }

    tbody tr {
      border-bottom: 1px solid #f9fafb;
      transition: background 0.15s;
    }
    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: #fafafa; }

    td {
      padding: 14px 20px;
      font-size: 0.9rem;
      color: #1a1f2e;
      vertical-align: middle;
    }

    td.muted { color: #9ca3af; font-size: 0.85rem; }

    .badge {
      display: inline-block;
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 0.8rem;
      font-weight: 500;
    }
    .badge-sent   { background: #dcfce7; color: #16a34a; }
    .badge-failed { background: #fee2e2; color: #dc2626; }

    .message-cell {
      max-width: 300px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      color: #4b5563;
      font-size: 0.875rem;
    }

    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: #9ca3af;
    }
    .empty-state p { margin-bottom: 16px; }
  </style>
</head>
<body>
  <div class="page">
    <a href="/" class="back-link">← Back to Home</a>
    <h1>Notifications</h1>
    <p class="page-subtitle">Audit log of all notifications sent by the mock notification service.</p>

    <!-- Empty state -->
    <div class="empty-state" th:if="${notifications == null or notifications.isEmpty()}">
      <p>No notifications sent yet.</p>
      <a href="/rooms" style="color:#1a1f2e; font-weight:600;">Make a booking to trigger one →</a>
    </div>

    <!-- Notifications table -->
    <div class="table-card" th:if="${notifications != null and !notifications.isEmpty()}">
      <table>
        <thead>
          <tr>
            <th>ID</th>
            <th>Email</th>
            <th>Reservation</th>
            <th>Message</th>
            <th>Sent At</th>
            <th>Status</th>
          </tr>
        </thead>
        <tbody>
          <tr th:each="n : ${notifications}">
            <td class="muted" th:text="${n.notificationId}"></td>
            <td th:text="${n.customerEmail}"></td>
            <td class="muted" th:text="${n.reservationId > 0} ? 'RES' + ${n.reservationId} : '—'"></td>
            <td class="message-cell" th:text="${n.message}"></td>
            <td class="muted" th:text="${n.sentAt}"></td>
            <td>
              <span th:text="${n.status}"
                    th:class="${n.status == 'SENT'} ? 'badge badge-sent' : 'badge badge-failed'">
              </span>
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
</body>
</html>
