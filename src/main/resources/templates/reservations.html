<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>My Reservations</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: #f0f2f5;
      min-height: 100vh;
      padding: 40px 24px;
    }

    .page { max-width: 900px; margin: 0 auto; animation: fadeUp 0.5s ease both; }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      color: #6b7280;
      text-decoration: none;
      font-size: 0.9rem;
      margin-bottom: 24px;
      transition: color 0.2s;
    }
    .back-link:hover { color: #1a1f2e; }

    h1 {
      font-size: 2.4rem;
      font-weight: 700;
      color: #1a1f2e;
      letter-spacing: -0.03em;
      margin-bottom: 28px;
    }

    .section-label {
      font-size: 0.8rem;
      font-weight: 600;
      color: #9ca3af;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 12px;
    }

    .reservation-card {
      background: #ffffff;
      border-radius: 16px;
      padding: 24px 28px;
      margin-bottom: 16px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.06);
      transition: box-shadow 0.2s;
    }
    .reservation-card:hover { box-shadow: 0 4px 16px rgba(0,0,0,0.1); }

    .card-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 16px;
    }

    .room-name { font-size: 1.2rem; font-weight: 700; color: #1a1f2e; margin-bottom: 4px; }
    .res-id    { font-size: 0.85rem; color: #9ca3af; }

    .badge {
      display: inline-block;
      padding: 5px 14px;
      border-radius: 20px;
      font-size: 0.8rem;
      font-weight: 500;
    }
    .badge-confirmed { background: #dcfce7; color: #16a34a; }
    .badge-waitlist  { background: #fff7ed; color: #f97316; }

    .card-meta { display: flex; gap: 32px; margin-bottom: 16px; }
    .meta-item { display: flex; flex-direction: column; gap: 3px; }

    .meta-label {
      font-size: 0.78rem;
      color: #9ca3af;
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .meta-value { font-size: 0.9rem; color: #1a1f2e; font-weight: 500; }

    .card-footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding-top: 16px;
      border-top: 1px solid #f3f4f6;
    }

    .booked-by { font-size: 0.875rem; color: #6b7280; }
    .booked-by strong { color: #1a1f2e; }
    .card-actions { display: flex; gap: 16px; align-items: center; }

    .btn-modify {
      color: #374151;
      font-size: 0.875rem;
      font-weight: 500;
      text-decoration: none;
      transition: color 0.2s;
    }
    .btn-modify:hover { color: #1a1f2e; }

    .btn-cancel {
      color: #ef4444;
      font-size: 0.875rem;
      font-weight: 500;
      text-decoration: none;
      transition: color 0.2s;
    }
    .btn-cancel:hover { color: #dc2626; }

    .empty-state { text-align: center; padding: 60px 20px; color: #9ca3af; }
    .empty-state p { margin-bottom: 16px; }
  </style>
</head>
<body>
  <div class="page">
    <a href="/" class="back-link">← Back to Home</a>
    <h1>My Reservations</h1>

    <!-- Empty state -->
    <div class="empty-state"
         th:if="${(reservations == null or reservations.isEmpty()) and (waitlistEntries == null or waitlistEntries.isEmpty())}">
      <p>No reservations yet.</p>
      <a href="/rooms" style="color:#1a1f2e; font-weight:600;">Browse Rooms →</a>
    </div>

    <!-- Reservations -->
    <div th:if="${reservations != null and !reservations.isEmpty()}">
      <div class="section-label">Reservations</div>
      <div class="reservation-card" th:each="res : ${reservations}">
        <div class="card-header">
          <div>
            <div class="room-name" th:text="${res.roomName}"></div>
            <div class="res-id" th:text="'ID: RES' + ${res.reservationId}"></div>
          </div>
          <span class="badge badge-confirmed" th:text="${res.status}"></span>
        </div>

        <div class="card-meta">
          <div class="meta-item">
            <span class="meta-label">📍 Location</span>
            <span class="meta-value" th:text="${res.location}"></span>
          </div>
          <div class="meta-item">
            <span class="meta-label">📅 Date</span>
            <span class="meta-value" th:text="${res.date}"></span>
          </div>
          <div class="meta-item">
            <span class="meta-label">🕐 Time</span>
            <span class="meta-value" th:text="${res.startTime} + ' - ' + ${res.endTime}"></span>
          </div>
        </div>

        <div class="card-footer">
          <span class="booked-by">Booked by: <strong th:text="${res.customerName}"></strong></span>
          <div class="card-actions">
            <a th:href="@{/reschedule(reservationId=${res.reservationId})}" class="btn-modify">Modify</a>
            <a th:href="@{/cancel(reservationId=${res.reservationId})}" class="btn-cancel">Cancel</a>
          </div>
        </div>
      </div>
    </div>

    <!-- Waitlist entries -->
    <div th:if="${waitlistEntries != null and !waitlistEntries.isEmpty()}">
      <div class="section-label" style="margin-top:28px;">Waitlist</div>
      <div class="reservation-card" th:each="entry : ${waitlistEntries}">
        <div class="card-header">
          <div>
            <div class="room-name" th:text="${entry.roomName}"></div>
            <div class="res-id" th:text="'Position #' + ${entry.position}"></div>
          </div>
          <span class="badge badge-waitlist">Waitlist</span>
        </div>

        <div class="card-meta">
          <div class="meta-item">
            <span class="meta-label">📍 Location</span>
            <span class="meta-value" th:text="${entry.location}"></span>
          </div>
          <div class="meta-item">
            <span class="meta-label">📅 Date</span>
            <span class="meta-value" th:text="${entry.date}"></span>
          </div>
          <div class="meta-item">
            <span class="meta-label">🕐 Time</span>
            <span class="meta-value" th:text="${entry.startTime} + ' - ' + ${entry.endTime}"></span>
          </div>
        </div>

        <div class="card-footer">
          <span class="booked-by">Waiting as: <strong th:text="${entry.customerName}"></strong></span>
          <div class="card-actions">
            <a th:href="@{/cancel-waitlist(waitlistId=${entry.waitlistId})}" class="btn-cancel">Leave Waitlist</a>
          </div>
        </div>
      </div>
    </div>

  </div>
</body>
</html>
