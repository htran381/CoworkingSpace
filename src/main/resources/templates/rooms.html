<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Available Rooms</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&display=swap"
    rel="stylesheet" />
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: #f0f2f5;
      min-height: 100vh;
      padding: 40px 24px;
    }

    .page {
      max-width: 900px;
      margin: 0 auto;
      animation: fadeUp 0.5s ease both;
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(20px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      color: #6b7280;
      text-decoration: none;
      font-size: 0.9rem;
      margin-bottom: 24px;
      transition: color 0.2s;
    }

    .back-link:hover {
      color: #1a1f2e;
    }

    h1 {
      font-size: 2.4rem;
      font-weight: 700;
      color: #1a1f2e;
      letter-spacing: -0.03em;
      margin-bottom: 6px;
    }

    .page-subtitle {
      color: #8a8f9e;
      font-size: 0.95rem;
      margin-bottom: 28px;
    }

    /* Search Card */
    .search-card {
      background: #ffffff;
      border-radius: 16px;
      padding: 24px;
      margin-bottom: 20px;
      box-shadow: 0 1px 4px rgba(0, 0, 0, 0.06);
    }

    .search-row {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 16px;
      margin-bottom: 16px;
    }

    .field-group label {
      display: block;
      font-size: 0.85rem;
      font-weight: 500;
      color: #4b5563;
      margin-bottom: 6px;
    }

    .field-group input {
      width: 100%;
      padding: 10px 14px;
      border: 1.5px solid #e5e7eb;
      border-radius: 10px;
      font-size: 0.95rem;
      font-family: 'DM Sans', sans-serif;
      color: #1a1f2e;
      outline: none;
      transition: border-color 0.2s;
    }

    .field-group input:focus {
      border-color: #1a1f2e;
    }

    .btn-search {
      width: 100%;
      padding: 14px;
      background: #1a1f2e;
      color: white;
      border: none;
      border-radius: 50px;
      font-size: 1rem;
      font-weight: 600;
      font-family: 'DM Sans', sans-serif;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .btn-search:hover {
      background: #2d3548;
    }

    /* Availability banner */
    .availability-banner {
      background: #eff6ff;
      border-radius: 10px;
      padding: 12px 16px;
      color: #3b82f6;
      font-size: 0.9rem;
      margin-bottom: 20px;
    }

    /* Rooms Table */
    .rooms-card {
      background: #ffffff;
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 1px 4px rgba(0, 0, 0, 0.06);
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    thead tr {
      border-bottom: 1.5px solid #f3f4f6;
    }

    th {
      text-align: left;
      padding: 14px 20px;
      font-size: 0.85rem;
      font-weight: 600;
      color: #6b7280;
      letter-spacing: 0.02em;
    }

    tbody tr {
      border-bottom: 1px solid #f9fafb;
      transition: background 0.15s;
    }

    tbody tr:last-child {
      border-bottom: none;
    }

    tbody tr:hover {
      background: #fafafa;
    }

    td {
      padding: 16px 20px;
      font-size: 0.95rem;
      color: #1a1f2e;
      vertical-align: middle;
    }

    td.muted {
      color: #9ca3af;
    }

    .badge {
      display: inline-block;
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 0.8rem;
      font-weight: 500;
    }

    .badge-available {
      background: #dcfce7;
      color: #16a34a;
    }

    .badge-occupied {
      background: #fee2e2;
      color: #dc2626;
    }

    .btn-book {
      background: #1a1f2e;
      color: white;
      border: none;
      padding: 9px 22px;
      border-radius: 50px;
      font-size: 0.875rem;
      font-weight: 600;
      font-family: 'DM Sans', sans-serif;
      cursor: pointer;
      text-decoration: none;
      display: inline-block;
      transition: all 0.2s;
    }

    .btn-book:hover {
      background: #2d3548;
      transform: translateY(-1px);
    }

    .btn-waitlist {
      background: #f97316;
      color: white;
      border: none;
      padding: 9px 22px;
      border-radius: 50px;
      font-size: 0.875rem;
      font-weight: 600;
      font-family: 'DM Sans', sans-serif;
      cursor: pointer;
      text-decoration: none;
      display: inline-block;
      transition: all 0.2s;
    }

    .btn-waitlist:hover {
      background: #ea6c00;
    }
  </style>
</head>

<body>
  <div class="page">
    <a href="/" class="back-link">← Back to Home</a>

    <h1>Available Rooms</h1>
    <p class="page-subtitle">Search for rooms by date and time</p>

    <!-- Search Filter -->
    <div class="search-card">
      <form method="get" action="/rooms">
        <div class="search-row">
          <div class="field-group">
            <label>Date</label>
            <input type="date" name="date" th:value="${searchDate}" />
          </div>
          <div class="field-group">
            <label>Start Time</label>
            <input type="time" name="startTime" th:value="${searchStart}" / step="1800">
          </div>
          <div class="field-group">
            <label>End Time</label>
            <input type="time" name="endTime" th:value="${searchEnd}" / step="1800">
          </div>
        </div>
        <button type="submit" class="btn-search">🔍 Search Available Rooms</button>
      </form>
    </div>

    <!-- Availability Banner -->
    <div class="availability-banner"
      th:if="${searchDate != null and searchDate != '' and searchStart != null and searchStart != ''}">
      Showing availability for <span th:text="${searchDate}"></span>
      from <span th:text="${searchStart}"></span> to <span th:text="${searchEnd}"></span>
    </div>

    <!-- Rooms Table -->
    <div class="rooms-card">
      <table>
        <thead>
          <tr>
            <th>Room Name</th>
            <th>Location</th>
            <th>Type</th>
            <th>Capacity</th>
            <th>Status</th>
            <th></th>
          </tr>
        </thead>
        <tbody>
          <tr th:each="room : ${rooms}">
            <td th:text="${room.roomName}">Focus Room A</td>
            <td class="muted" th:text="${room.location}">Floor 2, Room 201</td>
            <td th:text="${room.roomType}">Office</td>
            <td th:text="${room.capacity}">1</td>
            <td>
              <span th:text="${room.status}"
                th:class="${room.status == 'Available'} ? 'badge badge-available' : 'badge badge-occupied'">
              </span>
            </td>
            <td>
              <th:block th:if="${searchDate != null and searchDate != ''}">
                <a th:if="${room.status == 'Available'}"
                  th:href="@{/book(roomId=${room.roomId}, date=${searchDate}, startTime=${searchStart}, endTime=${searchEnd})}"
                  class="btn-book">Book</a>
                <a th:unless="${room.status == 'Available'}"
                  th:href="@{/waitlist(roomId=${room.roomId}, date=${searchDate}, startTime=${searchStart}, endTime=${searchEnd})}"
                  class="btn-waitlist">Waitlist</a>
              </th:block>
              <span th:unless="${searchDate != null and searchDate != ''}" style="color:#9ca3af; font-size:0.85rem;">
                Select a date to book
              </span>
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
</body>

</html>
